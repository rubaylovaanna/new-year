<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Что звучит? Угадай звук</title>
    <link rel="icon" href="../../../img/favicon/favbg.svg" type="image/x-icon">
    
    <!-- CSS с правильным путем -->
    <link rel="stylesheet" href="./css/aud-atten-new-year.css">
    
    <!-- Временные стили для проверки -->
    <style>
        /* Если основной CSS не загрузится, хотя бы будет фон */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: Стартовый экран -->
    <section id="start-screen" class="start-screen-new">
        <div class="main-card">
            <div class="fox-container">
                <img src="./img/header/fox-new-year.png" alt="Новогодняя лиса" class="mascot-new">
            </div>
            
            <div class="speech-bubble-new">
                <p>Динь-динь-динь! Новый год уже близко!<br>Помоги мне узнать праздничные звуки!</p>
            </div>
            
            <h1 class="game-title-new">Что звучит?</h1>
            
            <button id="btn-start" class="btn-start-new">
                <span class="play-icon">▶</span>
                Начать игру
            </button>
        </div>
    </section>

    <!-- ЭКРАН 2: Игровой процесс -->
    <section id="game-screen" class="game-screen-new hidden">
        <div class="game-background"></div>
        
        <header class="game-header">
            <div class="user-profile">
                <img src="./img/header/fox-new-year.png" alt="Аватар" class="user-avatar">
                <div class="user-info">
                    <span class="user-name">Малыш</span>
                    <div class="user-stars">
                        <span class="star-icon">⭐</span>
                        <span id="score">0</span>
                    </div>
                </div>
            </div>
            <button id="btn-back" class="btn-back-new" aria-label="Назад">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
        </header>

        <div class="game-title-section">
            <h2 class="main-title">Слушай звуки</h2>
            <p class="subtitle">Нажми «Послушать звук» и выбери, что это!</p>
        </div>

        <div class="fox-circle-container">
            <div class="music-note note-1">🎵</div>
            <div class="music-note note-2">🎶</div>
            <div class="fox-circle">
                <img src="./img/header/fox-new-year.png" alt="Лиса" class="fox-circle-img">
            </div>
        </div>

        <button id="btn-listen" class="btn-listen-new">
            <span class="speaker-icon"></span>
            Послушать звук
        </button>

        <div class="options-container">
            <div class="option-card" data-sound="bells">
                <img src="./img/form/bells.png" alt="Колокольчики" class="option-img">
                <span class="option-label">Колокольчики</span>
            </div>
            <div class="option-card" data-sound="chimes">
                <img src="./img/form/chimes.png" alt="Куранты" class="option-img">
                <span class="option-label">Куранты</span>
            </div>
            <div class="option-card" data-sound="fire">
                <img src="./img/form/fire.png" alt="Бенгальский огонь" class="option-img">
                <span class="option-label">Бенгальский огонь</span>
            </div>
            <div class="option-card" data-sound="whistle">
                <img src="./img/form/whistle.png" alt="Свистулька" class="option-img">
                <span class="option-label">Свистулька</span>
            </div>
        </div>

        <button id="btn-check" class="btn-check-new" disabled>
            <span class="check-icon">✓</span>
            Проверить ответ
        </button>

        <div class="snowman-decoration">
            <div class="snowman-placeholder">⛄</div>
        </div>
    </section>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="popup-overlay" class="popup-overlay hidden">
        <div class="popup-content" id="popup-content">
            <img id="popup-img" src="" alt="Результат" class="popup-img">
            <h2 id="popup-title"></h2>
            <p id="popup-text"></p>
            <button id="btn-popup-close" class="btn-popup-new">Продолжить!</button>
        </div>
    </div>

    <!-- Аудио -->
    <audio src="./audio/bells.mp4" id="audio-bells" preload="auto"></audio>
    <audio src="./audio/chimes.mp4" id="audio-chimes" preload="auto"></audio>
    <audio src="./audio/fire.mp4" id="audio-fire" preload="auto"></audio>
    <audio src="./audio/whistle.mp4" id="audio-whistle" preload="auto"></audio>

    <script src="./js/aud-atten-new-year.js"></script>
</body>
</html>
